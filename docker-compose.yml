services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pergo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-pergo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data

  pergo:
    build: .
    ports:
      - "8080:8080"
    environment:
      PERGO_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pergo}?sslmode=disable
      PERGO_NATS_URL: nats://nats:4222
      PERGO_SERVER_PORT: "8080"
      PERGO_ADMIN_PASSWORD: ${PERGO_ADMIN_PASSWORD:-pergo-dev-2026}
      PERGO_EXTERNAL_URL: ${PERGO_EXTERNAL_URL:-http://localhost:8080}
      PERGO_KEK_BASE64: ${PERGO_KEK_BASE64}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  pgdata:
  natsdata:
