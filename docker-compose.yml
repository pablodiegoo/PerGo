version: '3.8'

networks:
  shared-infra-net:
    external: true

services:
  pergo:
    build: .
    container_name: omnigo_pergo
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - shared-infra-net
    environment:
      PERGO_DATABASE_URL: postgres://admin:admin@shared_postgres:5432/pergo_db?sslmode=disable
      PERGO_NATS_URL: nats://shared_nats:4222
      PERGO_SERVER_PORT: "8080"
      PERGO_ADMIN_PASSWORD: ${PERGO_ADMIN_PASSWORD:-pergo-dev-2026}
      PERGO_EXTERNAL_URL: ${PERGO_EXTERNAL_URL:-http://localhost:8080}
      PERGO_KEK_BASE64: ${PERGO_KEK_BASE64}
